services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: talentstreamai
      POSTGRES_PASSWORD: talentstreamai
      POSTGRES_DB: talentstreamai
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U talentstreamai -d talentstreamai"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    ports:
      - "8000:8000"
    environment:
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-8000}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      AUTH_MODE: ${AUTH_MODE:-disabled}
      CLERK_JWKS_URL: ${CLERK_JWKS_URL:-}
      CLERK_ISSUER: ${CLERK_ISSUER:-}
      CLERK_AUDIENCE: ${CLERK_AUDIENCE:-}
      AGENT_MODE: ${AGENT_MODE:-stub}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.openai.com}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4.1-mini}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-45}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-1800}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.2}
      OPENROUTER_REFERER: ${OPENROUTER_REFERER:-}
      OPENROUTER_TITLE: ${OPENROUTER_TITLE:-}
      DATABASE_URL: postgresql://talentstreamai:talentstreamai@postgres:5432/talentstreamai
      UPLOAD_DIR: ${UPLOAD_DIR:-.data/uploads}
      UPLOAD_STORAGE: ${UPLOAD_STORAGE:-none}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_PREFIX: ${S3_PREFIX:-uploads/}
      S3_SSE: ${S3_SSE:-AES256}
      S3_KMS_KEY_ID: ${S3_KMS_KEY_ID:-}
    volumes:
      - ./backend/app:/app/app:ro
      - ./backend/.data:/app/.data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 3s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
