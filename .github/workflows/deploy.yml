name: Deploy TalentStreamAI

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - staging
          - prod

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-talentstream-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'dev' }}
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  DEPLOY_ENV: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'dev' }}

jobs:
  deploy:
    name: Deploy to ${{ env.DEPLOY_ENV }}
    runs-on: ubuntu-latest
    environment: ${{ env.DEPLOY_ENV }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-actions-deploy
          aws-region: ${{ secrets.DEFAULT_AWS_REGION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Run deploy script
        run: |
          export DEFAULT_AWS_REGION=${{ secrets.DEFAULT_AWS_REGION }}
          chmod +x scripts/deploy.sh
          ./scripts/deploy.sh "${{ env.DEPLOY_ENV }}"
        env:
          NEXT_DISABLE_API_REWRITE: "1"
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          TF_VAR_clerk_jwks_url: ${{ secrets.CLERK_JWKS_URL }}
          TF_VAR_clerk_issuer: ${{ secrets.CLERK_ISSUER }}
          TF_VAR_app_secrets_json: ${{ secrets.APP_SECRETS_JSON }}

      - name: Deployment summary
        if: success()
        working-directory: ./terraform
        run: |
          echo "## Deployed" >> $GITHUB_STEP_SUMMARY
          echo "CloudFront: \`$(terraform output -raw cloudfront_url)\`" >> $GITHUB_STEP_SUMMARY
          echo "API: \`$(terraform output -raw api_gateway_url)\`" >> $GITHUB_STEP_SUMMARY
          echo "Frontend bucket: \`$(terraform output -raw frontend_bucket_name)\`" >> $GITHUB_STEP_SUMMARY
