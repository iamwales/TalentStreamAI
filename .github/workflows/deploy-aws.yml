name: Deploy (manual)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to deploy
        type: choice
        options:
          - dev
          - staging
          - prod
        default: dev

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Dispatch note
        run: |
          echo "This workflow is kept for manual deployments."
          echo "Prefer the unified Terraform pipeline in .github/workflows/terraform.yml."
          echo "Environment: ${{ inputs.environment }}"
