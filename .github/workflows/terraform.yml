name: Terraform (plan/apply)

on:
  pull_request:
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"
      - "scripts/**"
      - "backend/**"
      - "backend/lambda/**"
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"
      - "scripts/**"
      - "backend/**"
      - "backend/lambda/**"
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to deploy
        type: choice
        options: [dev, staging, prod]
        default: dev

permissions:
  contents: read
  id-token: write

concurrency:
  group: terraform-${{ github.ref }}-${{ github.event.inputs.environment || 'auto' }}
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  TF_DIR: terraform
  AWS_REGION: us-east-1

jobs:
  plan:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.TF_DIR }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Build Lambda package
        run: bash ../scripts/build-lambda-zip.sh

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Init (local state; no S3 backend in repo)
        run: terraform init

      - name: Validate
        run: terraform validate

      - name: Plan (no backend)
        env:
          # Plan-time placeholders (real values come from your terraform.tfvars / environment secrets in apply)
          TF_VAR_clerk_jwks_url: "https://example.com/.well-known/jwks.json"
          TF_VAR_clerk_issuer: "https://example.com"
          TF_VAR_app_secrets_json: "{}"
        run: |
          terraform plan -no-color \
            -var="environment=dev" \
            -var="github_repository=${{ github.repository }}" \
            -var="enable_github_oidc=false" \
            -var="enable_aurora=false"

  apply:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.TF_DIR }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - name: Build Lambda package
        run: bash ../scripts/build-lambda-zip.sh

      - name: Enable S3 backend (not in git; local dev uses local state only)
        run: cp backend_s3.tf.example backend_s3.tf

      - name: Write backend.hcl
        run: |
          cat > backend.hcl <<EOF
          bucket         = "${{ secrets.TF_STATE_BUCKET }}"
          key            = "talentstreamai/${{ github.event.inputs.environment || 'dev' }}/terraform.tfstate"
          region         = "${{ secrets.TF_STATE_REGION }}"
          dynamodb_table = "${{ secrets.TF_LOCK_TABLE }}"
          encrypt        = true
          EOF

      - name: Init (remote state)
        run: terraform init -backend-config=backend.hcl

      - name: Apply
        env:
          TF_VAR_clerk_jwks_url: ${{ secrets.CLERK_JWKS_URL }}
          TF_VAR_clerk_issuer: ${{ secrets.CLERK_ISSUER }}
          TF_VAR_app_secrets_json: ${{ secrets.APP_SECRETS_JSON }}
        run: |
          terraform apply -auto-approve \
            -var="environment=${{ github.event.inputs.environment || 'dev' }}" \
            -var="github_repository=${{ github.repository }}" \
            -var="enable_github_oidc=true"

      - name: Read Terraform outputs
        id: tf
        run: |
          echo "bucket=$(terraform output -raw frontend_bucket_name)" >> "$GITHUB_OUTPUT"
          echo "distribution_id=$(terraform output -raw cloudfront_distribution_id)" >> "$GITHUB_OUTPUT"

      - name: Build frontend (static export)
        env:
          # Browser-only Clerk key (public) — not a network secret, but we keep it in GitHub secrets by convention.
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          # Static export: same-origin `/api/*` via CloudFront, disable dev rewrites
          NEXT_DISABLE_API_REWRITE: "1"
        run: |
          cd ../frontend
          npm ci
          npm run build

      - name: Upload frontend to S3
        run: |
          aws s3 sync ../frontend/out "s3://${{ steps.tf.outputs.bucket }}/" --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.tf.outputs.distribution_id }}" \
            --paths "/*"

