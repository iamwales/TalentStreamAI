name: Terraform (plan)

# Plan on PR when matching paths change. Apply and frontend deploy run in `.github/workflows/deploy-aws.yml`
# (push to `main` or manual dispatch). Fork PRs cannot use repository secrets for plan with AWS.
on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"
      - "scripts/**"
      - "backend/**"
      - "backend/lambda/**"
      - "frontend/**"

permissions:
  contents: read

concurrency:
  group: format('terraform-plan-pr-{0}', github.event.number)
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  TF_DIR: terraform
  AWS_REGION: us-east-1

jobs:
  plan:
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.TF_DIR }}
    steps:
      - uses: actions/checkout@v4

      # Match aws_lambda_function.api (python3.12) so pip gets cp312 manylinux wheels.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Build Lambda package
        run: bash ../scripts/build-lambda-zip.sh

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      # No AWS in this job (fmt/validate). Deploy uses `deploy-aws.yml` with OIDC and remote state.
      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Init (local state; no S3 backend in repo)
        run: terraform init

      - name: Validate
        run: terraform validate
